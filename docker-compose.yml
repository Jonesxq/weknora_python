services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: graph
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d graph"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - graph_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  wiki-worker:
    build: .
    command: celery -A app.infrastructure.tasks.celery_app:celery_app worker -l INFO
    environment:
      - GRAPH_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/graph
      - GRAPH_REDIS_URL=redis://redis:6379/2
      - GRAPH_CELERY_BROKER_URL=redis://redis:6379/0
      - GRAPH_CELERY_RESULT_BACKEND=redis://redis:6379/1
      - GRAPH_WIKI_LOCK_MODE=redis
      - GRAPH_WIKI_FAKE_DATA_FILE=/app/examples/wiki_fake_data.json
      - GRAPH_WIKI_CITATION_BATCH_CHARS=${GRAPH_WIKI_CITATION_BATCH_CHARS:-12000}
      - GRAPH_WIKI_CITATION_PARALLEL=${GRAPH_WIKI_CITATION_PARALLEL:-4}
      - GRAPH_WIKI_DEDUP_CANDIDATE_LIMIT=${GRAPH_WIKI_DEDUP_CANDIDATE_LIMIT:-20}
      - GRAPH_WIKI_TOMBSTONE_TTL_SECONDS=${GRAPH_WIKI_TOMBSTONE_TTL_SECONDS:-3600}
      - GRAPH_WIKI_TOMBSTONE_MODE=${GRAPH_WIKI_TOMBSTONE_MODE:-redis}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  outbox-dispatcher:
    build: .
    command: python -m app.wiki.tasks.outbox_dispatcher
    environment:
      - GRAPH_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/graph
      - GRAPH_CELERY_BROKER_URL=redis://redis:6379/0
      - GRAPH_CELERY_RESULT_BACKEND=redis://redis:6379/1
      - GRAPH_REDIS_URL=redis://redis:6379/2
      - GRAPH_WIKI_CITATION_BATCH_CHARS=${GRAPH_WIKI_CITATION_BATCH_CHARS:-12000}
      - GRAPH_WIKI_CITATION_PARALLEL=${GRAPH_WIKI_CITATION_PARALLEL:-4}
      - GRAPH_WIKI_DEDUP_CANDIDATE_LIMIT=${GRAPH_WIKI_DEDUP_CANDIDATE_LIMIT:-20}
      - GRAPH_WIKI_TOMBSTONE_TTL_SECONDS=${GRAPH_WIKI_TOMBSTONE_TTL_SECONDS:-3600}
      - GRAPH_WIKI_TOMBSTONE_MODE=${GRAPH_WIKI_TOMBSTONE_MODE:-redis}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  graph_postgres_data:
