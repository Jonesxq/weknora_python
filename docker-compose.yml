services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: graph
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d graph"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - graph_postgres_data:/var/lib/postgresql/data

volumes:
  graph_postgres_data:
